steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - build
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/aliko-jb-automotive'
    - '.'

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - run
    - deploy
    - aliko-jb-automotive
    - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/aliko-jb-automotive
    - --region=us-central1
    - --platform=managed
    - --allow-unauthenticated

images:
- us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/aliko-jb-automotive
